<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1"> 
  <script src="https://cdn.tailwindcss.com"></script> 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> 
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"> 
  <link rel="icon" type="image/x-icon"
        href="https://cdn-icons-png.freepik.com/256/11371/11371417.png">

  <title>Have a nice day!</title>

  <style>
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: black;
      color: white;
      padding: 8px;
      z-index: 1000;
    }
    .skip-link:focus {
      top: 0;
    }
  </style>
</head>

<body class="pt-20">
 
<a href="#main-content" class="skip-link">Skip to main content</a>
 
<header>
<!-- Navbar -->
<nav class="bg-black fixed w-full top-0 left-0 z-50">
  <div class="flex justify-between items-center px-6 py-3">

    <img src="https://cdn-icons-png.freepik.com/256/11371/11371417.png"
         alt="Coffee Shop Logo"
         class="h-10 w-14"> 
    <button id="menu-btn" class="text-white md:hidden text-2xl">
      ☰
    </button>
 
    <div id="menu"
         class="hidden md:flex flex-col md:flex-row text-white gap-6 
                absolute md:static top-16 left-0 w-full md:w-auto 
                bg-black md:bg-transparent text-center py-6 md:py-0 space-x-2">

      <a href="index.html">Home</a>
      <a href="About Us.html">About</a>
      <a href="Menu.html">Menu</a>
      <a href="#">Contact</a>
      <a href="login.html">Login</a>
      <a href="Cart.html">Cart</a>
    </div>

  </div>
</nav>

<!-- JS for Toggle -->
<script>
  const btn = document.getElementById("menu-btn");
  const menu = document.getElementById("menu");

  btn.addEventListener("click", () => {
    menu.classList.toggle("hidden");
  });
</script>

<style>
  body {
    padding-top: 80px;
  }
</style>

</header>
 
<main id="main-content">

<section class="py-3 py-md-5">
  <div class="container">
    <div class="row gy-3 gy-md-4 gy-lg-0 align-items-lg-center">
      
      <div class="col-12 flex col-lg-6">
        <img class="img-fluid rounded"
             loading="lazy"
             src="https://tse4.mm.bing.net/th?id=OIP.wuinSpEIRljUUYJLYCfriAHaE8&pid=Api&P=0&h=180"
             alt="Customer support team helping clients"
             style="height: 550px; width: 100%;">
      </div>

      <div class="col-12 col-lg-6">
        <div class="row justify-content-xl-center">
          <div class="col-12 col-xl-11">
            <h2 class="h1 mb-3">Contact Us</h2>
            <p class="lead fs-4 text-secondary mb-5">
              We're always on the lookout to work with new clients.
            </p>

            <form>

  <!-- Address -->
  <div class="d-flex mb-4">
    <div class="me-4 text-primary">
      <svg width="32" height="32"
           aria-hidden="true"
           focusable="false"
           fill="currentColor"
           class="bi bi-geo">
      </svg>
    </div>
    <div class="w-100">
      <label for="address" class="form-label fw-bold">Address</label>
      <input type="text"
             id="address"
             name="address"
             class="form-control"
             placeholder="Enter your address"
             required>
    </div>
  </div>

  <!-- Phone -->
  <div class="d-flex mb-4">
    <div class="me-4 text-primary">
      <svg width="32" height="32"
           aria-hidden="true"
           focusable="false"
           fill="currentColor"
           class="bi bi-telephone-outbound">
      </svg>
    </div>
    <div class="w-100">
      <label for="phone" class="form-label fw-bold">Phone</label>
      <input type="tel"
             id="phone"
             name="phone"
             class="form-control"
             placeholder="Enter your phone number"
             pattern="[0-9]{10}"
             required>
    </div>
  </div>

  <!-- Email -->
  <div class="d-flex mb-4">
    <div class="me-4 text-primary">
      <svg width="32" height="32"
           aria-hidden="true"
           focusable="false"
           fill="currentColor"
           class="bi bi-envelope-at">
      </svg>
    </div>
    <div class="w-100">
      <label for="email" class="form-label fw-bold">E-Mail</label>
      <input type="email"
             id="email"
             name="email"
             class="form-control"
             placeholder="Enter your email"
             required>
    </div>
  </div>

  <!-- Submit Button -->
  <div class="text-start">
    <button type="submit" class="btn btn-primary">
      Submit
    </button>
  </div>

</form>


          </div>
        </div>
      </div>
    </div>
  </div>
</section>

</main>

<!-- Footer -->
<footer class="bg-body-tertiary text-center" aria-label="Footer">
  <div class="container p-4 pb-0">

    <!-- Social Media -->
    <section class="mb-4" aria-label="Social Media Links">

      <a class="btn text-white btn-floating m-1"
         style="background-color: #3b5998;"
         href="#!"
         aria-label="Facebook"
         role="button"></a>

      <a class="btn text-white btn-floating m-1"
         style="background-color: #55acee;"
         href="#!"
         aria-label="Twitter"
         role="button"></a>

      <a class="btn text-white btn-floating m-1"
         style="background-color: #ac2bac;"
         href="#!"
         aria-label="Instagram"
         role="button"></a>

      <a class="btn text-white btn-floating m-1"
         style="background-color: #0082ca;"
         href="#!"
         aria-label="LinkedIn"
         role="button"></a>

      <a class="btn text-white btn-floating m-1"
         style="background-color: #333333;"
         href="#!"
         aria-label="GitHub"
         role="button"></a>

    </section>
  </div>

  <div class="text-center p-3"
       style="background-color: rgba(0, 0, 0, 0.05);">
    © 2026 Copyright:
    <span>Sana Yadav</span>
  </div>
</footer>

</body>
</html>
