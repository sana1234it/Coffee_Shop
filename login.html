<main id="main-content">

<section class="vh-100" style="background-color: #9A616D;">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col col-xl-10">
        <div class="card" style="border-radius: 1rem;">
          <div class="row g-0">

            <div class="col-md-6 col-lg-5 d-none d-md-block">
              <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-login-form/img1.webp"
                   alt="User login illustration"
                   class="img-fluid"
                   style="border-radius: 1rem 0 0 1rem;" />
            </div>

            <div class="col-md-6 col-lg-7 d-flex align-items-center">
              <div class="card-body p-4 p-lg-5 text-black">

                <form id="loginForm" novalidate aria-labelledby="login-heading">

                  <div class="d-flex align-items-center mb-3 pb-1">
                    <i class="fas fa-cubes fa-2x me-3" style="color: #ff6219;" aria-hidden="true"></i>
                    <span class="h1 fw-bold mb-0" id="login-heading">Good day!</span>
                  </div>

                  <h2 class="fw-normal mb-3 pb-3" style="letter-spacing: 1px;">
                    Sign into your account
                  </h2>

                  <!-- Email -->
                  <div class="form-outline mb-4">
                    <label class="form-label" for="email">Email address</label>
                    <input type="email"
                           id="email"
                           class="form-control form-control-lg"
                           required
                           aria-describedby="emailError">
                    <div class="invalid-feedback" id="emailError">
                      Please enter a valid email address.
                    </div>
                  </div>

                  <!-- Password -->
                  <div class="form-outline mb-4">
                    <label class="form-label" for="password">Password</label>
                    <input type="password"
                           id="password"
                           class="form-control form-control-lg"
                           required
                           minlength="6"
                           aria-describedby="passwordError">
                    <div class="invalid-feedback" id="passwordError">
                      Password must be at least 6 characters.
                    </div>
                  </div>

                  <div class="pt-1 mb-4">
                    <button class="btn btn-dark btn-lg btn-block"
                            type="submit"
                            aria-label="Login to your account">
                      Login
                    </button>
                  </div>

                  <a class="small text-muted" href="#">Forgot password?</a>
                  <a href="#" class="small text-muted">Terms of use.</a>
                  <a href="#" class="small text-muted">Privacy policy</a>

                </form>

              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>

</main> 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

 
<script>
  //toogle
  const btn = document.getElementById("menu-btn");
  const menu = document.getElementById("menu");

  btn.addEventListener("click", () => {
    menu.classList.toggle("hidden");
  });


document.addEventListener("DOMContentLoaded", function () {

  const form = document.getElementById("loginForm");

  form.addEventListener("submit", function (event) {
    event.preventDefault();

    const email = document.getElementById("email");
    const password = document.getElementById("password");

    let isValid = true;

    if (!email.value || !email.checkValidity()) {
      email.classList.add("is-invalid");
      email.setAttribute("aria-invalid", "true");
      isValid = false;
    } else {
      email.classList.remove("is-invalid");
      email.classList.add("is-valid");
      email.setAttribute("aria-invalid", "false");
    }

    if (!password.value || password.value.length < 6) {
      password.classList.add("is-invalid");
      password.setAttribute("aria-invalid", "true");
      isValid = false;
    } else {
      password.classList.remove("is-invalid");
      password.classList.add("is-valid");
      password.setAttribute("aria-invalid", "false");
    }

    if (isValid) {
      alert("Login Successful ✅");
      form.reset();
      email.classList.remove("is-valid");
      password.classList.remove("is-valid");
    }
  });
});
</script>
