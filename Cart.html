<section class="h-100 bg-black h-custom" style="background-color: #eee;" aria-labelledby="cartHeading">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col">
        <div class="card flex">
          <div class="card-body p-4">

            <div class="row">

              <div class="col-lg-7  ">

                <h2 id="cartHeading" class="visually-hidden"> Shopping Cart  </h2>

                <a href="Product.html" class="text-body">  Continue shopping   </a>
                <hr> 
                <div id="cartItems" aria-live="polite"></div>

              </div> 
              <div id="summary" aria-live="polite"></div>

            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", function () {
  renderCart();
});

function renderCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let cartContainer = document.getElementById("cartItems");
  cartContainer.innerHTML = "";

  let subtotal = 0;

  if (cart.length === 0) {
    cartContainer.innerHTML = "<p class='text-center'>Your cart is empty</p>";
    document.getElementById("summary").innerHTML = "";
    return;
  }

  cart.forEach((item, index) => {

    subtotal += item.price * item.quantity;

    cartContainer.innerHTML += `
      <div class="card mb-3 p-3">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h5>${item.name}</h5>
            <p>Price: €${item.price}</p>
          </div>

          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-secondary btn-sm"
              aria-label="Decrease quantity of ${item.name}"
              onclick="decreaseQty(${index})">-</button>

            <span>${item.quantity}</span>

            <button class="btn btn-secondary btn-sm"
              aria-label="Increase quantity of ${item.name}"
              onclick="increaseQty(${index})">+</button>
          </div>

          <div>
            <strong>€${item.price * item.quantity}</strong>
          </div>

          <button class="btn btn-danger btn-sm"
            aria-label="Remove ${item.name} from cart"
            onclick="removeItem(${index})">
            Remove
          </button>
        </div>
      </div>
    `;
  });

  let shipping = 20;
  let total = subtotal + shipping;

  document.getElementById("summary").innerHTML = `
    <div class="card p-4 mt-4">
      <h4>Order Summary</h4>
      <p>Subtotal: €${subtotal}</p>
      <p>Shipping: €${shipping}</p>
      <h5>Total: €${total}</h5>
      <button class="btn btn-success w-100 mt-3"
        aria-label="Proceed to checkout"
        onclick="checkout()">
        Checkout
      </button>
    </div>
  `;
}

function increaseQty(index) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart[index].quantity++;
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function decreaseQty(index) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  if (cart[index].quantity > 1) {
    cart[index].quantity--;
  }
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function removeItem(index) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function checkout() {
  alert("Order placed successfully!");
  localStorage.removeItem("cart");
  renderCart();
}

//toogle
const btn = document.getElementById("menu-btn");
  const menu = document.getElementById("menu");

  btn.addEventListener("click", () => {
    menu.classList.toggle("hidden");
  });
</script>
